<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>தமிழ் விடைகள் - AI Reader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@300;400;600;700&family=Inter:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0c0c14;
    --surface: #13131f;
    --card: #1a1a2e;
    --border: #2a2a45;
    --accent: #8b5cf6;
    --accent2: #a78bfa;
    --gold: #f59e0b;
    --text: #e2d9f3;
    --muted: #7c7a9a;
    --reading: #c4b5fd;
    --answered: #10b981;
    --en-accent: #38bdf8;
  }

  body {
    font-family: 'Noto Sans Tamil', 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.8;
  }

  /* TOP BAR */
  .topbar {
    background: linear-gradient(90deg, #0f0a20, #1e1040, #0f0a20);
    border-bottom: 1px solid var(--accent);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 200;
    gap: 10px;
  }
  .topbar h1 { font-size: 0.92rem; color: var(--accent2); font-weight: 600; flex-shrink: 0; }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .topbar .stats { font-size: 0.75rem; color: var(--muted); }

  /* LANG TOGGLE */
  .lang-toggle {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .lang-btn {
    padding: 5px 12px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .lang-btn.active { background: var(--accent); color: white; }
  .lang-btn:hover:not(.active) { color: var(--accent2); }

  .progress-bar {
    height: 3px;
    background: var(--border);
    position: sticky;
    top: 51px;
    z-index: 199;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    transition: width 0.4s ease;
    width: 0%;
  }

  /* UNIT TABS */
  .unit-tabs {
    display: flex;
    gap: 8px;
    padding: 12px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .unit-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 0.78rem;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .tab-btn:hover:not(.active) { border-color: var(--accent2); color: var(--accent2); }

  /* FILTER ROW */
  .filter-row {
    display: flex;
    gap: 8px;
    padding: 9px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 14px;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .filter-btn.active { background: var(--gold); color: #111; border-color: var(--gold); font-weight: 600; }
  .filter-btn:hover:not(.active) { border-color: var(--gold); color: var(--gold); }
  .filter-label { font-size: 0.75rem; color: var(--muted); margin-right: 4px; }

  /* MAIN AREA */
  .main { max-width: 760px; margin: 0 auto; padding: 14px; }

  /* READER CARD */
  .reader-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 10px;
    transition: border-color 0.3s;
  }
  .reader-card.state-reading { border-color: var(--accent); }
  .reader-card.state-answered { border-color: var(--answered); }
  .reader-card.type-16 { border-left: 4px solid var(--gold); }
  .reader-card.type-2 { border-left: 4px solid var(--accent); }

  /* QUESTION HEADER */
  .q-header {
    padding: 13px 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
  }
  .q-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
    align-items: center;
  }
  .q-num {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    font-weight: 700;
  }
  .type-2 .q-num { background: var(--accent); color: white; }
  .type-16 .q-num { background: var(--gold); color: #111; }

  .mark-badge {
    font-size: 0.6rem;
    padding: 2px 6px;
    border-radius: 8px;
    font-weight: 600;
  }
  .type-2 .mark-badge { background: rgba(139,92,246,0.2); color: var(--accent2); }
  .type-16 .mark-badge { background: rgba(245,158,11,0.2); color: var(--gold); }

  .q-text {
    flex: 1;
    font-size: 0.92rem;
    color: var(--text);
    padding-top: 5px;
    font-weight: 500;
  }
  .q-text .en { font-family: 'Inter', sans-serif; font-size: 0.82rem; color: var(--en-accent); margin-top: 3px; display: none; }
  body.lang-en .q-text .ta { display: none; }
  body.lang-en .q-text .en { display: block; }
  body.lang-ta .q-text .ta { display: block; }
  body.lang-ta .q-text .en { display: none; }
  body.lang-both .q-text .en { display: block; }
  body.lang-both .q-text .ta { display: block; }

  .q-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
    margin-left: 6px;
  }

  /* SPEAK BUTTON */
  .speak-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    background: rgba(139,92,246,0.15);
    color: var(--accent2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.95rem;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .speak-btn:hover { background: var(--accent); color: white; }
  .speak-btn.speaking { background: var(--accent); color: white; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    margin: auto;
    margin-top: 2px;
    transition: background 0.3s;
  }
  .state-reading .status-dot { background: var(--accent); }
  .state-answered .status-dot { background: var(--answered); }

  /* ANSWER AREA */
  .answer-area {
    padding: 0 14px 14px 54px;
    display: none;
    border-top: 1px solid var(--border);
    animation: slideDown 0.25s ease;
  }
  .answer-area.show { display: block; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  /* Answer language switching */
  .ans-ta { display: block; }
  .ans-en { display: none; font-family: 'Inter', sans-serif; font-size: 0.85rem; color: #bae6fd; }
  body.lang-en .ans-ta { display: none; }
  body.lang-en .ans-en { display: block; }
  body.lang-both .ans-ta { display: block; }
  body.lang-both .ans-en { display: block; }
  body.lang-both .ans-en { border-top: 1px solid rgba(56,189,248,0.2); margin-top: 10px; padding-top: 10px; }

  .answer-toggle {
    width: 100%;
    padding: 9px 14px;
    background: transparent;
    border: none;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-family: inherit;
    font-size: 0.8rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .answer-toggle:hover { background: rgba(139,92,246,0.08); color: var(--accent2); }
  .answer-toggle .arrow { transition: transform 0.2s; }
  .answer-area.show ~ .answer-toggle .arrow { transform: rotate(180deg); }

  .answer-area p { margin-bottom: 8px; font-size: 0.88rem; color: #c4b5fd; }
  .answer-area strong { color: #e9d5ff; }
  .answer-area ul { padding-left: 18px; }
  .answer-area ul li { margin-bottom: 5px; font-size: 0.88rem; }
  .answer-area ol { padding-left: 18px; }
  .answer-area ol li { margin-bottom: 5px; font-size: 0.88rem; }

  /* READ ALOUD ANSWER BUTTON */
  .read-answer-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 12px;
    padding: 6px 13px;
    border-radius: 20px;
    border: 1px solid var(--answered);
    background: rgba(16,185,129,0.1);
    color: var(--answered);
    cursor: pointer;
    font-size: 0.75rem;
    font-family: inherit;
    transition: all 0.2s;
  }
  .read-answer-btn:hover { background: rgba(16,185,129,0.2); }
  .read-answer-btn.speaking { animation: pulse 1s infinite; }

  /* MARK DONE */
  .mark-done-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 10px;
    margin-left: 8px;
    padding: 6px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.75rem;
    font-family: inherit;
    transition: all 0.2s;
  }
  .mark-done-btn:hover { border-color: var(--answered); color: var(--answered); }
  .mark-done-btn.done { background: rgba(16,185,129,0.15); border-color: var(--answered); color: var(--answered); }

  /* SPEAKING WAVE */
  .wave-indicator {
    display: none;
    align-items: center;
    gap: 3px;
    padding: 4px 0;
  }
  .wave-indicator.active { display: flex; }
  .wave-bar {
    width: 3px;
    height: 11px;
    background: var(--accent);
    border-radius: 2px;
    animation: wave 0.8s ease infinite;
  }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; }
  @keyframes wave { 0%,100% { transform: scaleY(0.5); opacity: 0.5; } 50% { transform: scaleY(1.4); opacity: 1; } }

  /* SECTION LABEL */
  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 18px 0 10px;
  }
  .section-label span {
    font-size: 0.72rem;
    font-weight: 700;
    padding: 4px 13px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .section-label.type-2 span { background: rgba(139,92,246,0.2); color: var(--accent2); border: 1px solid var(--accent); }
  .section-label.type-16 span { background: rgba(245,158,11,0.15); color: var(--gold); border: 1px solid var(--gold); }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* UNIT TITLE */
  .unit-title {
    background: linear-gradient(135deg, #1a1040, #0f1630);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    margin: 0 0 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .unit-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #7c3aed);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .unit-title h2 { font-size: 0.72rem; color: var(--muted); margin-bottom: 2px; }
  .unit-title h3 { font-size: 0.95rem; color: var(--reading); }
  .unit-title .unit-title-en { font-size: 0.75rem; color: var(--en-accent); font-family: 'Inter', sans-serif; margin-top: 2px; display: none; }
  body.lang-en .unit-title h3 { display: none; }
  body.lang-en .unit-title .unit-title-en { display: block; }
  body.lang-both .unit-title .unit-title-en { display: block; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

  /* BOTTOM HINT */
  .hint-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(13,13,20,0.95);
    border-top: 1px solid var(--border);
    padding: 9px 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    font-size: 0.72rem;
    color: var(--muted);
    backdrop-filter: blur(8px);
  }
  .hint-bar span { display: flex; align-items: center; gap: 4px; }

  .content-area { padding-bottom: 60px; }

  /* SEARCH */
  .search-wrap {
    padding: 9px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .search-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 13px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  /* CONTROLS */
  .controls-bar {
    display: flex;
    gap: 7px;
    padding: 9px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    align-items: center;
    flex-wrap: wrap;
  }

  /* SCORE BADGE */
  .score-area {
    padding: 10px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
  }
  .score-pill { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; }
  .score-num { font-size: 1.05rem; font-weight: 700; color: var(--accent2); }
  .score-label { color: var(--muted); }

  .ctrl-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 11px;
    border-radius: 8px;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .ctrl-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .ctrl-btn.danger:hover { border-color: #ef4444; color: #ef4444; }

  @media (max-width: 480px) {
    .q-text { font-size: 0.84rem; }
    .topbar h1 { font-size: 0.8rem; }
    .hint-bar { gap: 12px; font-size: 0.68rem; }
  }
</style>
</head>
<body class="lang-ta">

<div class="topbar">
  <h1>📚 தமிழ் விடைகள் Reader</h1>
  <div class="topbar-right">
    <div class="stats" id="topStats">ஏற்றுகிறது...</div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btnTa" onclick="setLang('ta')">தமிழ்</button>
      <button class="lang-btn" id="btnBoth" onclick="setLang('both')">Both</button>
      <button class="lang-btn" id="btnEn" onclick="setLang('en')">EN</button>
    </div>
  </div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<!-- UNIT TABS -->
<div class="unit-tabs" id="unitTabs"></div>

<!-- SEARCH -->
<div class="search-wrap">
  <input type="text" class="search-input" id="searchInput" placeholder="🔍 கேள்வி தேடுங்கள் / Search questions..." oninput="filterCards()">
</div>

<!-- FILTERS -->
<div class="filter-row">
  <span class="filter-label">மதிப்பெண்:</span>
  <button class="filter-btn active" onclick="setFilter('all', this)">அனைத்தும்</button>
  <button class="filter-btn" onclick="setFilter('2', this)">2 மதிப்பெண்</button>
  <button class="filter-btn" onclick="setFilter('16', this)">16 மதிப்பெண்</button>
</div>

<!-- SCORE + CONTROLS -->
<div class="score-area">
  <div class="score-pill">
    <div class="score-num" id="doneCount">0</div>
    <div class="score-label">படித்தது</div>
  </div>
  <div class="score-pill">
    <div class="score-num" id="totalCount">0</div>
    <div class="score-label">மொத்தம்</div>
  </div>
  <div style="margin-left: auto; display: flex; gap: 7px; flex-wrap: wrap;">
    <button class="ctrl-btn" onclick="expandAll()">📖 திற</button>
    <button class="ctrl-btn" onclick="collapseAll()">📕 மூடு</button>
    <button class="ctrl-btn danger" onclick="resetDone()">🔄 மீட்டமை</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main content-area" id="mainContent"></div>

<!-- BOTTOM HINT -->
<div class="hint-bar">
  <span>🔊 கேளு</span>
  <span>👁️ விடை காண்</span>
  <span>✅ குறி</span>
  <span>🌐 மொழி மாற்று</span>
</div>

<script>
// ─────────────────────────────────────────────
// DATA — Tamil + English
// ─────────────────────────────────────────────
const data = {
  units: [
    {
      id: 'u1',
      label: 'அலகு I',
      labelEn: 'Unit I',
      title: 'நெசவு மற்றும் பானை தொழில்நுட்பம்',
      titleEn: 'Weaving & Pottery Technology',
      icon: '🏺',
      questions: [
        {
          type: 2,
          q: 'பருத்திப்பெண்டீர் யார்?',
          qEn: 'Who are Paruththippendir?',
          a: '<p><strong>பருத்திப்பெண்டீர்</strong> என்பவர் சங்க கால நூல்களில் குறிப்பிடப்படும் <strong>பெண் நெசவாளர்கள்</strong> ஆவர். இவர்கள் பருத்தியை நூலாக நூற்று ஆடை நெய்யும் பணியை செய்தனர்.</p>',
          aEn: '<p><strong>Paruththippendir</strong> refers to the <strong>women weavers</strong> mentioned in Sangam literature. They spun cotton into thread and wove it into cloth, playing a key role in the textile industry of ancient Tamilnadu.</p>'
        },
        {
          type: 2,
          q: 'பா அல்லது பாவோட்டுதல் என்றால் என்ன?',
          qEn: 'What is "Paa" or "Paavottuthal"?',
          a: '<p><strong>பா</strong> என்பது நெசவின் ஓர் அடிப்படை நுட்பம். நூல்களை ஒழுங்காக வரிசைப்படுத்தி நெசவுத் தறியில் கட்டும் முறையே <strong>பாவோட்டுதல்</strong> எனப்படும்.</p>',
          aEn: '<p><strong>Paa</strong> is a basic technique in weaving. The process of systematically arranging threads and setting them on the loom is called <strong>Paavottuthal</strong>. It determines the structure and pattern of the cloth.</p>'
        },
        {
          type: 2,
          q: 'நெசவின் வகைகள் யாவை?',
          qEn: 'What are the types of weaving?',
          a: '<ul><li><strong>மேல் நெசவு</strong> – கைத்தறி நெசவு</li><li><strong>கீழ் நெசவு</strong> – காலால் இயக்கும் தறி நெசவு</li><li><strong>கம்பளி நெசவு</strong> – ஆட்டு உரோமம் கொண்டு நெய்தல்</li><li><strong>பட்டு நெசவு</strong> – பட்டுப் புழு நூல் கொண்டு நெய்தல்</li></ul>',
          aEn: '<ul><li><strong>Upper weaving</strong> – Hand loom weaving</li><li><strong>Lower weaving</strong> – Foot-operated loom weaving</li><li><strong>Wool weaving</strong> – Using sheep wool</li><li><strong>Silk weaving</strong> – Using silkworm thread</li></ul>'
        },

          aEn: '<ol><li><strong>Marabu</strong> – Stating the hero\'s lineage/clan</li><li><strong>Munnor</strong> – Naming the ancestors</li><li><strong>Seyal</strong> – Describing the heroic deed</li><li><strong>Karanam</strong> – Reason for the hero\'s death</li><li><strong>Maranam</strong> – Manner of death</li><li><strong>Vila</strong> – The ceremony of installing the hero stone</li></ol>' },
        { type: 2, q: 'மாமல்லபுரம் கடற்கரைக் கோயில் யாரால் கட்டப்பட்டது?', qEn: 'Who built the Shore Temple at Mahabalipuram?',
          a: '<p>மாமல்லபுரம் கடற்கரைக் கோயில் <strong>நரசிம்மவர்மன் II (ராஜசிம்மன்)</strong> என்ற பல்லவ மன்னரால் கி.பி. 700-728 காலத்தில் கட்டப்பட்டது. இது <strong>யுனெஸ்கோ உலக பாரம்பரிய தளம்</strong> ஆகும்.</p>',
          aEn: '<p>The Shore Temple at Mahabalipuram was built by the Pallava king <strong>Narasimhavarman II (Rajasimhan)</strong> around 700-728 CE. It is a <strong>UNESCO World Heritage Site</strong>.</p>' },
        { type: 2, q: 'குடைவரைக் கோவில் என்றால் என்ன?', qEn: 'What is a rock-cut temple (Kudaivarai Kovil)?',
          a: '<p><strong>குடைவரைக் கோவில்</strong> என்பது மலைகளை அல்லது பாறைகளை குடைந்து (வெட்டி) உருவாக்கப்பட்ட கோவில் ஆகும். இவை <strong>Rock-cut temples</strong> எனவும் அழைக்கப்படும்.</p>',
          aEn: '<p><strong>Kudaivarai Kovil</strong> refers to temples carved out of hills or rocks. They are also called <strong>Rock-cut temples</strong>. The Pallavas were masters of this art form.</p>' },
        { type: 2, q: 'பஞ்சபாண்டவர்கள் இரதங்கள் யாவை?', qEn: 'What are the Pancha Pandava Rathas?',
          a: '<ol><li><strong>தர்மராஜ இரதம்</strong> – மிகப் பெரியது</li><li><strong>பீம இரதம்</strong></li><li><strong>அர்ஜுன இரதம்</strong></li><li><strong>நகுல சகதேவ இரதம்</strong></li><li><strong>திரௌபதி இரதம்</strong> – மிகச் சிறியது</li></ol><p>இவை ஒரே கல்லில் செதுக்கப்பட்ட (monolithic) ஐந்து இரதங்கள்.</p>',
          aEn: '<ol><li><strong>Dharmaraja Ratha</strong> – The largest one</li><li><strong>Bhima Ratha</strong></li><li><strong>Arjuna Ratha</strong></li><li><strong>Nakula Sahadeva Ratha</strong></li><li><strong>Draupadi Ratha</strong> – The smallest one</li></ol><p>These are five monolithic temples carved from a single rock at Mahabalipuram.</p>' },
        { type: 16, q: 'பல்லவர் கால கட்டிடக் கலைகள் பற்றி விவரிக்கவும்.', qEn: 'Describe the architecture of the Pallava period.',
          a: '<p><strong>பல்லவர் கால கட்டிடக்கலை:</strong></p><p>பல்லவர்கள் கி.பி. 4-9 நூற்றாண்டுகளில் ஆட்சி செய்தனர்.</p><p><strong>முக்கிய வகைகள்:</strong></p><ul><li><strong>குடைவரைக் கோவில்கள்</strong> – மலைகளை குடைந்து கட்டிய கோவில்கள்</li><li><strong>இரதங்கள் (Ratha)</strong> – ஒரே கல்லில் செதுக்கிய கோவில்கள். பஞ்ச பாண்டவ இரதங்கள்</li><li><strong>கட்டுமான கோவில்கள்</strong> – கல் கட்டிகளால் கட்டப்பட்ட கோவில்கள்</li></ul><p><strong>சிறப்புகள்:</strong></p><ul><li>யுனெஸ்கோ உலக பாரம்பரிய தளம்</li><li>அர்ஜுன தபசு – உலகின் மிகப் பெரிய பாறை சிற்பம்</li><li>திராவிட பாணி கட்டிடக்கலையின் தொடக்கம்</li></ul>',
          aEn: '<p><strong>Pallava Period Architecture:</strong></p><p>The Pallavas ruled from 4th to 9th century CE.</p><p><strong>Main Types:</strong></p><ul><li><strong>Rock-cut Temples</strong> – Temples carved into hillsides</li><li><strong>Rathas (Chariots)</strong> – Monolithic temples carved from single rocks. The Pancha Pandava Rathas</li><li><strong>Structural Temples</strong> – Temples built using stone blocks. The Shore Temple</li></ul><p><strong>Highlights:</strong></p><ul><li>UNESCO World Heritage Site</li><li>Arjuna\'s Penance – the world\'s largest open-air rock bas-relief</li><li>Beginning of the Dravidian style of architecture</li></ul>' },
        { type: 16, q: 'சோழர் காலத்துப் பெருங்கோவில்களை பற்றி விவரிக்கவும்.', qEn: 'Describe the great temples of the Chola period.',
          a: '<p><strong>சோழர் கால பெருங்கோவில்கள்:</strong></p><p><strong>1. பெரிய கோவில் (தஞ்சாவூர்):</strong></p><ul><li>ராஜராஜ சோழன் கட்டினார் (கி.பி. 1010)</li><li>66 மீட்டர் உயர விமானம்</li><li>யுனெஸ்கோ உலக பாரம்பரிய தளம்</li></ul><p><strong>2. கங்கை கொண்ட சோழபுரம்:</strong></p><ul><li>ராஜேந்திர சோழன் கட்டினார்</li><li>கங்கை நதி வெற்றி கொண்ட நினைவாக</li></ul><p><strong>3. ஐராவதேஸ்வரர் கோவில் (தாரசுரம்):</strong> ராஜராஜ சோழன் II கட்டினார்.</p>',
          aEn: '<p><strong>Great Chola Temples:</strong></p><p><strong>1. Brihadeeswara Temple (Thanjavur):</strong></p><ul><li>Built by Rajaraja Chola I (1010 CE)</li><li>66-meter tall vimana (tower)</li><li>UNESCO World Heritage Site</li></ul><p><strong>2. Gangaikonda Cholapuram:</strong></p><ul><li>Built by Rajendra Chola</li><li>Commemorating the victory over the Ganges River</li></ul><p><strong>3. Airavatesvara Temple (Darasuram):</strong> Built by Rajaraja Chola II.</p>' },
        { type: 16, q: 'மாமல்லபுரத்தில் உள்ள கடற்கரைக் கோயில்கள் மற்றும் குகைக் கோயில்களை விவரிக்கவும்.', qEn: 'Describe the Shore Temple and Cave Temples at Mahabalipuram.',
          a: '<p><strong>கடற்கரை கோவில்கள்:</strong></p><ul><li>கி.பி. 700-728, ராஜசிம்மன் கட்டினார்</li><li>3 கோவில்கள் – 2 சிவன், 1 விஷ்ணு</li><li>யுனெஸ்கோ உலக பாரம்பரிய தளம்</li></ul><p><strong>குகைக் கோவில்கள்:</strong></p><ul><li>மஹிஷாசுரமர்தனி குகை – துர்கை கோவில்</li><li>வராஹ மண்டபம் – விஷ்ணு கோவில்</li><li>திரிமூர்த்தி குகை</li></ul>',
          aEn: '<p><strong>Shore Temple:</strong></p><ul><li>Built by Rajasimhan (700-728 CE)</li><li>3 shrines – 2 for Shiva, 1 for Vishnu</li><li>UNESCO World Heritage Site</li></ul><p><strong>Cave Temples:</strong></p><ul><li>Mahishasuramardini Cave – Temple dedicated to Goddess Durga</li><li>Varaha Mandapam – Temple dedicated to Vishnu</li><li>Trimurti Cave – Temple for the Trinity</li></ul>' },
      ]
    },
    {
      id: 'u3',
      label: 'அலகு III',
      labelEn: 'Unit III',
      title: 'உற்பத்தித் தொழில்நுட்பம்',
      titleEn: 'Production Technology',
      icon: '⚓',
      questions: [
        { type: 2, q: 'கட்டு மரங்களின் வேறு பெயர்கள் யாவை?', qEn: 'What are the other names for boats/ships in ancient Tamil?',
          a: '<ul><li><strong>அம்பி</strong> – சிறிய படகு</li><li><strong>நாவாய்</strong> – பெரிய கப்பல்</li><li><strong>வங்கம்</strong> – வணிக கப்பல்</li><li><strong>ஓடம்</strong> – சாதாரண படகு</li><li><strong>பரிசல்</strong> – ஆற்றுப் படகு</li><li><strong>திமில்</strong> – மீன்பிடி படகு</li></ul>',
          aEn: '<ul><li><strong>Ambi</strong> – Small boat</li><li><strong>Naavai</strong> – Large ship</li><li><strong>Vangam</strong> – Merchant ship (for overseas trade)</li><li><strong>Odam</strong> – Ordinary boat</li><li><strong>Parisal</strong> – River boat</li><li><strong>Thimil</strong> – Fishing boat</li></ul>' },
        { type: 2, q: 'பரதவர் பற்றி குறிப்பு வரைக.', qEn: 'Write a note on Paratavar.',
          a: '<p><strong>பரதவர்</strong> என்பவர் சங்க காலத்தில் கடலோரங்களில் வாழ்ந்த <strong>மீனவ மக்கள்</strong> ஆவர். இவர்கள் மீன் பிடித்தல், கடல் வாணிகம், கப்பல் ஓட்டுதல் ஆகியவற்றில் வல்லவர்கள். இவர்கள் <strong>"நெய்தல்"</strong> திணையைச் சேர்ந்தவர்கள்.</p>',
          aEn: '<p><strong>Paratavar</strong> were the <strong>fishing community</strong> who lived along the coasts during the Sangam period. They were skilled in fishing, sea trade, and navigation. They belong to the <strong>"Neythal"</strong> landscape in Sangam literature.</p>' },
        { type: 2, q: 'நாணயங்கள் குறிப்பு வரைக.', qEn: 'Write a note on ancient Tamil coins.',
          a: '<p>சங்க காலத்தில் நாணயங்கள் <strong>வெள்ளி, தங்கம், செம்பு</strong> ஆகியவற்றால் செய்யப்பட்டன. <strong>கா, மஞ்சாடி, பொன்</strong> போன்ற நாணயங்கள் புழக்கத்தில் இருந்தன. உரோமானிய நாணயங்களும் தமிழகத்தில் கண்டெடுக்கப்பட்டுள்ளன.</p>',
          aEn: '<p>During the Sangam period, coins were made of <strong>silver, gold, and copper</strong>. Coins like <strong>Kaa, Manjadi, and Pon</strong> were in circulation. Roman coins have also been discovered in Tamilnadu, proving ancient overseas trade.</p>' },
        { type: 2, q: 'நவரத்தினக் கற்களின் பெயர்களை எழுதுக.', qEn: 'Write the names of the Navaratna (nine precious gems).',
          a: '<ol><li>வைரம் (Diamond)</li><li>மாணிக்கம் (Ruby)</li><li>முத்து (Pearl)</li><li>பவளம் (Coral)</li><li>மரகதம் (Emerald)</li><li>நீலம் (Blue Sapphire)</li><li>புஷ்பராகம் (Topaz)</li><li>வைடூரியம் (Cat\'s eye)</li><li>கோமேதகம் (Hessonite)</li></ol>',
          aEn: '<ol><li>Diamond (Vairam)</li><li>Ruby (Maanikkam)</li><li>Pearl (Muthu)</li><li>Coral (Pavalam)</li><li>Emerald (Maragatham)</li><li>Blue Sapphire (Neelam)</li><li>Topaz (Pushparagam)</li><li>Cat\'s Eye (Vaiduryam)</li><li>Hessonite (Gomedhakam)</li></ol>' },
        { type: 2, q: 'கம்மியர் என்பவர் யார்?', qEn: 'Who are Kammiyar?',
          a: '<p><strong>கம்மியர்</strong> என்பவர் சங்க காலத்தில் <strong>இரும்பு மற்றும் பிற உலோகங்களை</strong> வேலை செய்த கொல்லர்கள் ஆவர். இவர்கள் வேல், வாள், கலப்பை போன்ற கருவிகளை தயாரித்தனர்.</p>',
          aEn: '<p><strong>Kammiyar</strong> were the <strong>blacksmiths</strong> of the Sangam period who worked with iron and other metals. They manufactured weapons like spears and swords, and agricultural tools like ploughs.</p>' },
        { type: 2, q: 'மணிகளால் என்னென்ன பொருட்கள் செய்தனர்?', qEn: 'What items were made from beads/gems?',
          a: '<ul><li><strong>மாலைகள்</strong> – கழுத்தில் அணியும் அணிகலன்</li><li><strong>காப்பு (வளை)</strong> – கையில் அணியும் அணிகலன்</li><li><strong>காதணிகள்</strong> – காதில் அணியும் அணிகலன்</li><li><strong>கிரீடம்</strong> – தலையில் அணியும் முடி அலங்காரம்</li><li><strong>மோதிரம்</strong> – விரலில் அணியும் அணிகலன்</li></ul>',
          aEn: '<ul><li><strong>Necklaces</strong> – Ornaments worn around the neck</li><li><strong>Bangles/Kaappu</strong> – Ornaments worn on the wrist</li><li><strong>Earrings</strong> – Ornaments worn on the ears</li><li><strong>Crown/Kireedam</strong> – Headgear decoration</li><li><strong>Rings</strong> – Ornaments worn on fingers</li></ul>' },
        { type: 16, q: 'பழந்தமிழர் கப்பல் கலை குறித்து விளக்கி எழுதுக.', qEn: 'Explain the ancient Tamil art of shipbuilding.',
          a: '<p><strong>கப்பல் வகைகள்:</strong></p><ul><li><strong>வங்கம்</strong> – வணிக கப்பல்</li><li><strong>நாவாய்</strong> – பெரிய கப்பல்</li><li><strong>அம்பி</strong> – சிறிய படகு</li><li><strong>திமில்</strong> – மீன்பிடி படகு</li></ul><p><strong>கப்பல் கட்டும் பொருட்கள்:</strong></p><ul><li>தேக்கு மரம், வேம்பு மரம்</li><li>மரப்பால் (Resin) – நீர் புகாமல் தடுக்க</li></ul><p><strong>வணிக இலக்குகள்:</strong> உரோமானிய சாம்ராஜ்யம், அரேபியா, தென்கிழக்கு ஆசிய நாடுகள்</p>',
          aEn: '<p><strong>Types of Ships:</strong></p><ul><li><strong>Vangam</strong> – Merchant ship for overseas trade</li><li><strong>Naavai</strong> – Large ship</li><li><strong>Ambi</strong> – Small boat</li><li><strong>Thimil</strong> – Fishing boat</li></ul><p><strong>Shipbuilding Materials:</strong></p><ul><li>Teak wood, Neem wood</li><li>Tree resin – to prevent water seepage</li></ul><p><strong>Trade Destinations:</strong> Roman Empire, Arabia, Southeast Asian countries</p>' },
        { type: 16, q: 'பண்டைய தமிழர்களின் உலோகவியல் திறனை விளக்குங்கள்.', qEn: 'Explain the metallurgical skills of the ancient Tamils.',
          a: '<p><strong>இரும்பு உலோகவியல்:</strong></p><ul><li>கீழடி அகழ்வாராய்ச்சியில் இரும்பு கருவிகள் கிடைத்துள்ளன</li><li>வேல், வாள், கலப்பை, அரிவாள் தயாரித்தனர்</li></ul><p><strong>வெண்கலம் (Bronze):</strong></p><ul><li>செம்பு + தகரம் கலந்து வெண்கலம் செய்தனர்</li><li>நடராஜர் சிற்பங்கள் வெண்கலத்தில் செய்யப்பட்டன</li></ul><p><strong>ஆதாரங்கள்:</strong> கீழடி, அரிக்கமேடு அகழ்வாராய்ச்சி கண்டுபிடிப்புகள்</p>',
          aEn: '<p><strong>Iron Metallurgy:</strong></p><ul><li>Iron tools were found in the Keeladi excavations</li><li>They manufactured spears, swords, ploughs, and sickles</li></ul><p><strong>Bronze:</strong></p><ul><li>Bronze was made by mixing copper and tin</li><li>The famous Nataraja sculptures were cast in bronze</li></ul><p><strong>Archaeological Evidence:</strong> Discoveries from Keeladi and Arikamedu excavations</p>' },
        { type: 16, q: 'நாணயங்கள் மற்றும் அவற்றின் வரலாற்று முக்கியத்துவம் பற்றி எழுதவும்.', qEn: 'Write about ancient coins and their historical significance.',
          a: '<p><strong>வகைகள்:</strong></p><ul><li>பொன் (Gold coins) – அரச நாணயங்கள்</li><li>வெள்ளி நாணயங்கள் – வணிக நாணயங்கள்</li><li>செப்பு நாணயங்கள் – அன்றாட பரிமாற்றம்</li></ul><p><strong>நாணயங்களில் காணப்படும் உருவங்கள்:</strong></p><ul><li>மீன், வில் – பாண்டியர், சேரர் சின்னங்கள்</li><li>புலி – சோழர் சின்னம்</li></ul>',
          aEn: '<p><strong>Types:</strong></p><ul><li>Gold coins – Royal coins used by kings</li><li>Silver coins – Merchant trade coins</li><li>Copper coins – For daily transactions</li></ul><p><strong>Symbols on Coins:</strong></p><ul><li>Fish, Bow – Pandya and Chera symbols</li><li>Tiger – Chola symbol</li></ul><p><strong>Historical Significance:</strong></p><ul><li>Help identify kings and dynasties</li><li>Prove ancient overseas trade</li><li>Help establish chronology</li></ul>' },
      ]
    },

      questions: [
        { type: 2, q: 'கல்லணை குறித்துக் குறிப்பு வரைக.', qEn: 'Write a note on Kallanai (Grand Anicut).',
          a: '<p><strong>கல்லணை</strong> திருச்சிராப்பள்ளி மாவட்டத்தில் காவேரி நதியில் அமைந்துள்ளது. இதை <strong>கரிகால் சோழன்</strong> கி.மு. 2-ம் நூற்றாண்டில் கட்டினார். <strong>உலகின் மிகப் பழமையான நீர்த்தேக்கம்</strong> – இன்றும் பயன்பாட்டில் உள்ளது. நீளம் 329 மீட்டர்.</p>',
          aEn: '<p><strong>Kallanai (Grand Anicut)</strong> is located on the Kaveri River in Tiruchirappalli district. It was built by <strong>Karikaal Cholan</strong> in the 2nd century BCE. It is the <strong>world\'s oldest water regulator</strong> still in use today. Length: 329 meters.</p>' },
        { type: 2, q: 'நீர் வெட்டியார் என்பவர் யார்?', qEn: 'Who is a Neer Vettiyaar?',
          a: '<p><strong>நீர் வெட்டியார்</strong> என்பவர் சங்க காலத்தில் <strong>வயல்களுக்கு நீர் பாசனம் நிர்வகித்த</strong> அலுவலர் ஆவர். இவர்கள் நீரை சரியான அளவில் பகிர்ந்தளிக்கும் பொறுப்பை வகித்தனர்.</p>',
          aEn: '<p><strong>Neer Vettiyaar</strong> was an official during the Sangam period who <strong>managed irrigation water distribution</strong> to the fields. They held the responsibility of distributing water in the correct proportion to each farmer.</p>' },
        { type: 2, q: 'குமிழித்தூம்பு குறிப்பு வரைக.', qEn: 'Write a note on Kumizhi Thoombhu.',
          a: '<p><strong>குமிழித்தூம்பு</strong> என்பது நீர்த்தேக்கங்களில் நீரை வெளியேற்றுவதற்காக அமைக்கப்பட்ட <strong>அடிமட்ட வடிகால் குழாய் (sluice)</strong> ஆகும்.</p>',
          aEn: '<p><strong>Kumizhi Thoombhu</strong> is a <strong>bottom-level drainage sluice</strong> built in reservoirs to release water. When needed, it was opened to direct water to the farmlands below.</p>' },
        { type: 2, q: 'மடை குறிப்பு வரைக.', qEn: 'Write a note on Madai (sluice gate).',
          a: '<p><strong>மடை (Sluice)</strong> என்பது ஏரி அல்லது கால்வாயில் நீரை கட்டுப்படுத்த அமைக்கப்படும் <strong>வாயில் (gate)</strong> ஆகும்.</p>',
          aEn: '<p><strong>Madai (Sluice gate)</strong> is a <strong>gate</strong> installed in tanks or canals to control the flow of water. Opening it directs water to the paddy fields for irrigation.</p>' },

          a: '<ul><li><strong>1. பாசன நீர்</strong> – விவசாயத்திற்கு தண்ணீர்</li><li><strong>2. குடிநீர்</strong> – மக்களுக்கும் கால்நடைகளுக்கும்</li><li><strong>3. மீன் வளர்ப்பு</strong> – மீன்பிடி தொழில்</li><li><strong>4. நிலத்தடி நீர் பெருக்கம்</strong> – கிணறுகளில் நீர் இருக்கும்</li></ul>',

        { type: 16, q: 'சங்க காலத்து நீர் மேலாண்மை பற்றி விரிவாக எழுதவும்.', qEn: 'Write in detail about water management during the Sangam period.',

        { type: 16, q: 'கல்லணை - அதன் கட்டுமானம், நோக்கம் மற்றும் வரலாற்று முக்கியத்துவம் பற்றி விளக்குக.', qEn: 'Explain Kallanai – its construction, purpose, and historical significance.',
          a: '<p><strong>கட்டிய மன்னர்:</strong> கரிகால் சோழன் | <strong>இடம்:</strong> காவேரி நதி | <strong>அளவு:</strong> நீளம் 329 மீட்டர்</p><p><strong>கட்டுமான முறை:</strong></p><ul><li>கற்களை சுண்ணாம்பு சாந்து இல்லாமல் நிரைத்தனர்</li><li>நதியின் குறுக்கே கட்டினர்</li></ul><p><strong>வரலாற்று முக்கியத்துவம்:</strong></p><ul><li>உலகின் மிகப் பழமையான நீர்த்தேக்க அமைப்பு</li><li>2000 ஆண்டுகளுக்கும் மேலாக இன்றும் பயன்பாட்டில் உள்ளது</li></ul>',

          a: '<p><strong>கணித்தமிழ்</strong> என்பது கணிதக் கருத்துக்களை தமிழ் மொழியில் விளக்கும் துறை. <strong>கணக்கதிகாரம்</strong> போன்ற நூல்கள் கணித தமிழின் வளர்ச்சியை காட்டுகின்றன.</p>',

        { type: 2, q: 'சொற்குவைத்திட்டம் என்றால் என்ன?', qEn: 'What is a Corpus (Sorkkuvai Thittam)?',

          a: '<p><strong>பண்டைய கணித்தமிழ் நூல்கள்:</strong></p><ul><li>கணக்கதிகாரம் – தொகுப்பு கணக்கு</li><li>கணிதசாரம்</li></ul><p><strong>தமிழ் அளவை முறைகள்:</strong></p><ul><li><strong>நீள அளவு</strong> – விரல், சாண், முழம், கோல், காதம்</li><li><strong>நிறை அளவு</strong> – குன்றிமணி, பலம், மணை, வீசை</li><li><strong>திரவ அளவு</strong> – உழக்கு, படி, ஆழாக்கு</li></ul>',

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let activeUnit = 'all';
let activeFilter = 'all';
let currentLang = 'ta';
let doneSet = new Set(JSON.parse(localStorage.getItem('tamilDone_v2') || '[]'));
let speakingId = null;

// ─────────────────────────────────────────────
// LANGUAGE
// ─────────────────────────────────────────────
function setLang(lang) {
  currentLang = lang;
  document.body.className = 'lang-' + lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn' + lang.charAt(0).toUpperCase() + lang.slice(1))?.classList.add('active');
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function getCardId(uid, idx) { return uid + '-' + idx; }

function saveDone() {
  localStorage.setItem('tamilDone_v2', JSON.stringify([...doneSet]));
}

function updateStats() {
  const cards = document.querySelectorAll('.reader-card');
  const total = cards.length;
  const done = [...cards].filter(c => c.classList.contains('state-answered')).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('topStats').textContent = done + '/' + total;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
}

function renderAll() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const content = document.getElementById('mainContent');
  content.innerHTML = '';
  let totalCards = 0;

  for (const unit of data.units) {
    if (activeUnit !== 'all' && activeUnit !== unit.id) continue;

    const filtered = unit.questions.filter(q => {
      if (activeFilter !== 'all' && q.type !== parseInt(activeFilter)) return false;
      if (search && !q.q.toLowerCase().includes(search) && !q.qEn.toLowerCase().includes(search)) return false;
      return true;
    });
    if (filtered.length === 0) continue;

    // Unit title
    const uDiv = document.createElement('div');
    uDiv.className = 'unit-title';
    uDiv.innerHTML = `<div class="unit-icon">${unit.icon}</div><div><h2>${unit.label} · ${unit.labelEn}</h2><h3>${unit.title}</h3><div class="unit-title-en">${unit.titleEn}</div></div>`;
    content.appendChild(uDiv);

    const by2 = filtered.filter(q => q.type === 2);
    const by16 = filtered.filter(q => q.type === 16);

    function renderGroup(group, type) {
      if (!group.length) return;
      const sec = document.createElement('div');
      sec.className = 'section-label type-' + type;
      sec.innerHTML = `<span>${type === 2 ? '2 மதிப்பெண் · 2 Marks' : '16 மதிப்பெண் · 16 Marks'}</span>`;
      content.appendChild(sec);

      group.forEach((item, localIdx) => {
        const globalIdx = unit.questions.indexOf(item);
        const cid = getCardId(unit.id, globalIdx);
        const isDone = doneSet.has(cid);

        const card = document.createElement('div');
        card.className = `reader-card type-${type}${isDone ? ' state-answered' : ''}`;
        card.id = 'card-' + cid;

        // Store question text in data attrs to avoid escaping issues
        card.dataset.qtamil = item.q;
        card.dataset.qenglish = item.qEn;
        card.dataset.atamil = item.a;
        card.dataset.aenglish = item.aEn;

        card.innerHTML = `
          <div class="q-header" onclick="toggleAnswer('${cid}')">
            <div class="q-meta">
              <div class="q-num">${localIdx + 1}</div>
              <div class="mark-badge">${type}M</div>
              <div class="status-dot" id="dot-${cid}"></div>
            </div>
            <div class="q-text">
              <span class="ta">${item.q}</span>
              <span class="en">${item.qEn}</span>
            </div>
            <div class="q-actions" onclick="event.stopPropagation()">
              <button class="speak-btn" id="spk-${cid}" title="கேளு / Listen" onclick="speakQ('${cid}')">🔊</button>
              <div class="wave-indicator" id="wave-${cid}">
                <div class="wave-bar"></div><div class="wave-bar"></div>
                <div class="wave-bar"></div><div class="wave-bar"></div>
              </div>
            </div>
          </div>
          <div class="answer-area" id="ans-${cid}">
            <div class="ans-ta">${item.a}</div>
            <div class="ans-en">${item.aEn}</div>
            <div style="margin-top:12px; display:flex; flex-wrap:wrap; gap:8px;">
              <button class="read-answer-btn" id="rspk-${cid}" onclick="speakAns('${cid}')">🔊 விடையை கேளு / Listen</button>
              <button class="mark-done-btn ${isDone ? 'done' : ''}" id="done-${cid}" onclick="toggleDone('${cid}')">
                ${isDone ? '✅ படித்தது' : '⬜ படித்தது குறி'}
              </button>
            </div>
          </div>
          <button class="answer-toggle" onclick="toggleAnswer('${cid}')">
            <span>விடை காண்க · Show Answer</span>
            <span class="arrow">▼</span>
          </button>
        `;
        content.appendChild(card);
        totalCards++;
      });
    }

    if (activeFilter === 'all') { renderGroup(by2, 2); renderGroup(by16, 16); }
    else if (activeFilter === '2') renderGroup(by2, 2);
    else renderGroup(by16, 16);
  }

  if (totalCards === 0) {
    content.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>கேள்விகள் எதுவும் கிடைக்கவில்லை / No questions found</p></div>';
  }
  updateStats();
}

// ─────────────────────────────────────────────
// UNIT TABS
// ─────────────────────────────────────────────
function buildTabs() {
  const tabs = document.getElementById('unitTabs');
  tabs.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'tab-btn active';
  allBtn.textContent = '📚 அனைத்தும்';
  allBtn.onclick = () => { activeUnit = 'all'; setActiveTab(allBtn); renderAll(); };
  tabs.appendChild(allBtn);
  for (const unit of data.units) {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.textContent = unit.icon + ' ' + unit.label;
    btn.onclick = () => { activeUnit = unit.id; setActiveTab(btn); renderAll(); };
    tabs.appendChild(btn);
  }
}
function setActiveTab(el) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

// ─────────────────────────────────────────────
// FILTER / SEARCH
// ─────────────────────────────────────────────
function setFilter(val, btn) {
  activeFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}
function filterCards() { renderAll(); }

// ─────────────────────────────────────────────
// TOGGLE ANSWER
// ─────────────────────────────────────────────
function toggleAnswer(cid) {
  const ans = document.getElementById('ans-' + cid);
  if (!ans) return;
  ans.classList.toggle('show');
  const card = document.getElementById('card-' + cid);
  if (ans.classList.contains('show')) card.classList.add('state-reading');
  else card.classList.remove('state-reading');
  updateStats();
}
function expandAll() {
  document.querySelectorAll('.answer-area').forEach(a => a.classList.add('show'));
  document.querySelectorAll('.reader-card').forEach(c => c.classList.add('state-reading'));
  updateStats();
}
function collapseAll() {
  document.querySelectorAll('.answer-area').forEach(a => a.classList.remove('show'));
  document.querySelectorAll('.reader-card').forEach(c => c.classList.remove('state-reading'));
  updateStats();
}

// ─────────────────────────────────────────────
// MARK DONE
// ─────────────────────────────────────────────
function toggleDone(cid) {
  const card = document.getElementById('card-' + cid);
  const btn = document.getElementById('done-' + cid);
  if (doneSet.has(cid)) {
    doneSet.delete(cid);
    card.classList.remove('state-answered');
    btn.classList.remove('done');
    btn.textContent = '⬜ படித்தது குறி';
  } else {
    doneSet.add(cid);
    card.classList.add('state-answered');
    btn.classList.add('done');
    btn.textContent = '✅ படித்தது';
  }
  saveDone();
  updateStats();
}
function resetDone() {
  if (!confirm('அனைத்து முன்னேற்றத்தையும் மீட்டமைக்கவா?\nReset all progress?')) return;
  doneSet.clear();
  saveDone();
  renderAll();
}

// ─────────────────────────────────────────────
// SPEECH — FIX: use data attrs, not inline strings
// ─────────────────────────────────────────────
function stopSpeech() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (speakingId) {
    const spk = document.getElementById('spk-' + speakingId);
    const wave = document.getElementById('wave-' + speakingId);
    const rspk = document.getElementById('rspk-' + speakingId);
    if (spk) spk.classList.remove('speaking');
    if (wave) wave.classList.remove('active');
    if (rspk) rspk.classList.remove('speaking');
    speakingId = null;
  }
}

function speak(text, cid, isAns) {
  stopSpeech();
  if (!window.speechSynthesis) { alert('உங்கள் உலாவியில் Text-to-Speech ஆதரிக்கப்படவில்லை.'); return; }
  const clean = text.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
  const utt = new SpeechSynthesisUtterance(clean);
  // Choose language based on current mode
  utt.lang = currentLang === 'en' ? 'en-IN' : 'ta-IN';
  utt.rate = 0.85;
  speakingId = cid;
  const spk = document.getElementById('spk-' + cid);
  const wave = document.getElementById('wave-' + cid);
  const rspk = document.getElementById('rspk-' + cid);
  if (!isAns && spk) { spk.classList.add('speaking'); if (wave) wave.classList.add('active'); }
  if (isAns && rspk) rspk.classList.add('speaking');
  utt.onend = () => stopSpeech();
  utt.onerror = () => stopSpeech();
  window.speechSynthesis.speak(utt);
}

function speakQ(cid) {
  if (speakingId === cid) { stopSpeech(); return; }
  const card = document.getElementById('card-' + cid);
  if (!card) return;
  // Pick text based on language
  const text = (currentLang === 'en') ? card.dataset.qenglish : card.dataset.qtamil;
  speak(text, cid, false);
}

function speakAns(cid) {
  if (speakingId === cid) { stopSpeech(); return; }
  const card = document.getElementById('card-' + cid);
  if (!card) return;
  const text = (currentLang === 'en') ? card.dataset.aenglish : card.dataset.atamil;
  speak(text, cid, true);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
buildTabs();
renderAll();
</script>
</body>
</html>
