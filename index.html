<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>தமிழ் விடைகள் - AI Reader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0c0c14;
    --surface: #13131f;
    --card: #1a1a2e;
    --border: #2a2a45;
    --accent: #8b5cf6;
    --accent2: #a78bfa;
    --gold: #f59e0b;
    --text: #e2d9f3;
    --muted: #7c7a9a;
    --reading: #c4b5fd;
    --answered: #10b981;
  }

  body {
    font-family: 'Noto Sans Tamil', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.8;
  }

  /* TOP BAR */
  .topbar {
    background: linear-gradient(90deg, #0f0a20, #1e1040, #0f0a20);
    border-bottom: 1px solid var(--accent);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 200;
  }
  .topbar h1 { font-size: 1rem; color: var(--accent2); font-weight: 600; }
  .topbar .stats { font-size: 0.8rem; color: var(--muted); }
  .progress-bar {
    height: 3px;
    background: var(--border);
    position: sticky;
    top: 51px;
    z-index: 199;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    transition: width 0.4s ease;
    width: 0%;
  }

  /* UNIT TABS */
  .unit-tabs {
    display: flex;
    gap: 8px;
    padding: 14px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .unit-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 0.78rem;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .tab-btn:hover:not(.active) { border-color: var(--accent2); color: var(--accent2); }

  /* FILTER ROW */
  .filter-row {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 14px;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .filter-btn.active { background: var(--gold); color: #111; border-color: var(--gold); font-weight: 600; }
  .filter-btn:hover:not(.active) { border-color: var(--gold); color: var(--gold); }
  .filter-label { font-size: 0.75rem; color: var(--muted); margin-right: 4px; }

  /* MAIN AREA */
  .main { max-width: 760px; margin: 0 auto; padding: 16px; }

  /* READER CARD */
  .reader-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 12px;
    transition: border-color 0.3s;
    position: relative;
  }
  .reader-card.state-reading { border-color: var(--accent); }
  .reader-card.state-answered { border-color: var(--answered); }
  .reader-card.type-16 { border-left: 4px solid var(--gold); }
  .reader-card.type-2 { border-left: 4px solid var(--accent); }

  /* QUESTION HEADER */
  .q-header {
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
    position: relative;
  }
  .q-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
    align-items: center;
  }
  .q-num {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    font-weight: 700;
  }
  .type-2 .q-num { background: var(--accent); color: white; }
  .type-16 .q-num { background: var(--gold); color: #111; }

  .mark-badge {
    font-size: 0.6rem;
    padding: 2px 6px;
    border-radius: 8px;
    font-weight: 600;
  }
  .type-2 .mark-badge { background: rgba(139,92,246,0.2); color: var(--accent2); }
  .type-16 .mark-badge { background: rgba(245,158,11,0.2); color: var(--gold); }

  .q-text {
    flex: 1;
    font-size: 0.92rem;
    color: var(--text);
    padding-top: 4px;
    font-weight: 500;
  }

  .q-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
    margin-left: 8px;
  }

  /* SPEAK BUTTON */
  .speak-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    background: rgba(139,92,246,0.15);
    color: var(--accent2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .speak-btn:hover { background: var(--accent); color: white; }
  .speak-btn.speaking { background: var(--accent); color: white; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  /* STATUS INDICATOR */
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    margin: auto;
    margin-top: 4px;
    transition: background 0.3s;
  }
  .state-reading .status-dot { background: var(--accent); }
  .state-answered .status-dot { background: var(--answered); }

  /* ANSWER AREA */
  .answer-area {
    padding: 0 16px 16px 58px;
    display: none;
    border-top: 1px solid var(--border);
    animation: slideDown 0.25s ease;
  }
  .answer-area.show { display: block; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  .answer-toggle {
    width: 100%;
    padding: 10px 16px;
    background: transparent;
    border: none;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-family: inherit;
    font-size: 0.82rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .answer-toggle:hover { background: rgba(139,92,246,0.08); color: var(--accent2); }
  .answer-toggle .arrow { transition: transform 0.2s; }
  .answer-area.show ~ .answer-toggle .arrow { transform: rotate(180deg); }

  .answer-area p { margin-bottom: 8px; font-size: 0.88rem; color: #c4b5fd; }
  .answer-area strong { color: #e9d5ff; }
  .answer-area ul { padding-left: 18px; }
  .answer-area ul li { margin-bottom: 5px; font-size: 0.88rem; }
  .answer-area ol { padding-left: 18px; }
  .answer-area ol li { margin-bottom: 5px; font-size: 0.88rem; }

  /* READ ALOUD ANSWER BUTTON */
  .read-answer-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--answered);
    background: rgba(16,185,129,0.1);
    color: var(--answered);
    cursor: pointer;
    font-size: 0.78rem;
    font-family: inherit;
    transition: all 0.2s;
  }
  .read-answer-btn:hover { background: rgba(16,185,129,0.2); }
  .read-answer-btn.speaking { animation: pulse 1s infinite; }

  /* MARK DONE */
  .mark-done-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    margin-left: 10px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.78rem;
    font-family: inherit;
    transition: all 0.2s;
  }
  .mark-done-btn:hover { border-color: var(--answered); color: var(--answered); }
  .mark-done-btn.done { background: rgba(16,185,129,0.15); border-color: var(--answered); color: var(--answered); }

  /* SPEAKING WAVE */
  .wave-indicator {
    display: none;
    align-items: center;
    gap: 3px;
    padding: 4px 0;
  }
  .wave-indicator.active { display: flex; }
  .wave-bar {
    width: 3px;
    height: 12px;
    background: var(--accent);
    border-radius: 2px;
    animation: wave 0.8s ease infinite;
  }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; }
  @keyframes wave { 0%,100% { transform: scaleY(0.5); opacity: 0.5; } 50% { transform: scaleY(1.4); opacity: 1; } }

  /* SECTION LABEL */
  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0 12px;
  }
  .section-label span {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }
  .section-label.type-2 span { background: rgba(139,92,246,0.2); color: var(--accent2); border: 1px solid var(--accent); }
  .section-label.type-16 span { background: rgba(245,158,11,0.15); color: var(--gold); border: 1px solid var(--gold); }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* UNIT TITLE */
  .unit-title {
    background: linear-gradient(135deg, #1a1040, #0f1630);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin: 0 0 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .unit-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #7c3aed);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }
  .unit-title h2 { font-size: 0.78rem; color: var(--muted); margin-bottom: 2px; }
  .unit-title h3 { font-size: 1rem; color: var(--reading); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

  /* BOTTOM NAV HINT */
  .hint-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(13,13,20,0.95);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    font-size: 0.75rem;
    color: var(--muted);
    backdrop-filter: blur(8px);
  }
  .hint-bar span { display: flex; align-items: center; gap: 5px; }

  .content-area { padding-bottom: 60px; }

  /* SEARCH */
  .search-wrap {
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .search-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  /* CONTROLS */
  .controls-bar {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    align-items: center;
    flex-wrap: wrap;
  }
  .ctrl-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .ctrl-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .ctrl-btn.danger:hover { border-color: #ef4444; color: #ef4444; }

  /* SCORE BADGE */
  .score-area {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .score-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8rem;
  }
  .score-num {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent2);
  }
  .score-label { color: var(--muted); }

  @media (max-width: 480px) {
    .q-text { font-size: 0.85rem; }
    .topbar h1 { font-size: 0.88rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>📚 தமிழ் விடைகள் Reader</h1>
  <div class="stats" id="topStats">ஏற்றுகிறது...</div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<!-- UNIT TABS -->
<div class="unit-tabs" id="unitTabs"></div>

<!-- SEARCH -->
<div class="search-wrap">
  <input type="text" class="search-input" id="searchInput" placeholder="🔍 கேள்வி தேடுங்கள்..." oninput="filterCards()">
</div>

<!-- FILTERS -->
<div class="filter-row">
  <span class="filter-label">மதிப்பெண்:</span>
  <button class="filter-btn active" onclick="setFilter('all', this)">அனைத்தும்</button>
  <button class="filter-btn" onclick="setFilter('2', this)">2 மதிப்பெண்</button>
  <button class="filter-btn" onclick="setFilter('16', this)">16 மதிப்பெண்</button>
</div>

<!-- SCORE + CONTROLS -->
<div class="score-area">
  <div class="score-pill">
    <div class="score-num" id="doneCount">0</div>
    <div class="score-label">படித்தது</div>
  </div>
  <div class="score-pill">
    <div class="score-num" id="totalCount">0</div>
    <div class="score-label">மொத்தம்</div>
  </div>
  <div style="margin-left: auto; display: flex; gap: 8px;">
    <button class="ctrl-btn" onclick="expandAll()">📖 அனைத்தும் திற</button>
    <button class="ctrl-btn" onclick="collapseAll()">📕 அனைத்தும் மூடு</button>
    <button class="ctrl-btn danger" onclick="resetDone()">🔄 மீட்டமை</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main content-area" id="mainContent"></div>

<!-- BOTTOM HINT -->
<div class="hint-bar">
  <span>🔊 கேள்வியை கேள்</span>
  <span>👁️ விடையை காண்</span>
  <span>✅ படித்தது குறி</span>
</div>

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const data = {
  units: [
    {
      id: 'u1',
      label: 'அலகு I',
      title: 'நெசவு மற்றும் பானை தொழில்நுட்பம்',
      icon: '🏺',
      questions: [
        { type: 2, q: 'பருத்திப்பெண்டீர் யார்?', a: '<p><strong>பருத்திப்பெண்டீர்</strong> என்பவர் சங்க கால நூல்களில் குறிப்பிடப்படும் <strong>பெண் நெசவாளர்கள்</strong> ஆவர். இவர்கள் பருத்தியை நூலாக நூற்று ஆடை நெய்யும் பணியை செய்தனர். இவர்கள் சங்க காலத்தில் தமிழக நெசவுத் தொழிலில் முக்கிய பங்கு வகித்தனர்.</p>' },
        { type: 2, q: 'பா அல்லது பாவோட்டுதல் என்றால் என்ன?', a: '<p><strong>பா</strong> என்பது நெசவின் ஓர் அடிப்படை நுட்பம் ஆகும். நூல்களை ஒழுங்காக வரிசைப்படுத்தி நெசவுத் தறியில் கட்டும் முறையே <strong>பாவோட்டுதல்</strong> எனப்படும். இதன் மூலம் ஆடையின் அமைப்பு நிர்ணயிக்கப்படுகிறது.</p>' },
        { type: 2, q: 'நெசவின் வகைகள் யாவை?', a: '<ul><li><strong>மேல் நெசவு</strong> – கைத்தறி நெசவு</li><li><strong>கீழ் நெசவு</strong> – காலால் இயக்கும் தறி நெசவு</li><li><strong>கம்பளி நெசவு</strong> – ஆட்டு உரோமம் கொண்டு நெய்தல்</li><li><strong>பட்டு நெசவு</strong> – பட்டுப் புழு நூல் கொண்டு நெய்தல்</li></ul>' },
        { type: 2, q: 'நெசவுத்தறியின் பகுதிகளில் ஏதேனும் இரண்டின் பெயர்களை எழுதுக.', a: '<ul><li><strong>ஆப்பு (Reed)</strong> – நூல்களை ஒழுங்குபடுத்தும் பகுதி</li><li><strong>தரி (Shuttle)</strong> – கிடையிலாக நூலை கொண்டு செல்லும் பகுதி</li><li><strong>கழுத்தாணி</strong> – நூல்களை நிலைப்படுத்தும் பகுதி</li></ul>' },
        { type: 2, q: 'சங்க காலத்தில் நெசவு செய்த ஆடைகளை எவ்வாறு விற்றனர்?', a: '<p>சங்க காலத்தில் நெசவு ஆடைகளை <strong>சந்தைகளில் (பேட்டை)</strong> விற்பனை செய்தனர். மேலும் <strong>ஏற்றுமதி</strong> மூலம் வெளிநாடுகளுக்கும் அனுப்பினர். வணிகர்கள் (வாணிகர்) ஆடைகளை வாங்கி தொலைதூரம் கொண்டு சென்று விற்பனை செய்தனர்.</p>' },
        { type: 2, q: 'எங்கு சாயத்தொட்டிகள் கண்டெடுக்கப்பட்டன?', a: '<p>சாயத்தொட்டிகள் <strong>அரிக்கமேடு</strong> (புதுச்சேரி அருகே) என்னும் இடத்தில் கண்டெடுக்கப்பட்டன. இங்கு உரோமானிய வணிகர்களுடன் தமிழர்கள் வணிகம் செய்ததற்கான சான்றுகளும் கிடைத்துள்ளன.</p>' },
        { type: 2, q: 'மதுரையில் எவ்வகை மட்பாண்டங்கள் சிறந்தவையாகக் கருதப்படுகின்றது?', a: '<p>மதுரையில் <strong>கருப்பு மற்றும் சிவப்பு மட்பாண்டங்கள் (Black and Red Ware)</strong> சிறந்தவையாகக் கருதப்படுகின்றன. இவை மிகவும் திண்மையாகவும் அழகாகவும் செய்யப்பட்டு வெளிநாடுகளுக்கும் ஏற்றுமதி செய்யப்பட்டன.</p>' },
        { type: 2, q: 'வேலூர் கரிகிரி மட்பாண்டங்களின் சிறப்பு என்ன?', a: '<p>வேலூர் கரிகிரி மட்பாண்டங்கள் <strong>மிகவும் மெல்லியதாகவும் ஒளி ஊடுருவக்கூடியதாகவும்</strong> (egg-shell thin) இருக்கும். இவற்றின் தயாரிப்பு நுட்பம் மிகவும் தனித்துவமானது.</p>' },
        { type: 2, q: 'மட்பாண்டங்களின் இரு பிரிவுகள் என்ன?', a: '<ul><li><strong>பளபளப்பான மட்பாண்டங்கள் (Polished Ware)</strong> – மேற்பரப்பை மெருகேற்றி தயாரிக்கப்படும்</li><li><strong>மெருகூட்டப்படாத மட்பாண்டங்கள் (Unpolished Ware)</strong> – இயற்கையான முரடான தோற்றமுடையவை</li></ul>' },
        { type: 2, q: 'மட்பாண்டங்களில் காணப்படும் குறியீடுகள் யாவை?', a: '<p>மட்பாண்டங்களில் <strong>தமிழி எழுத்துகள், சின்னங்கள், வடிவங்கள்</strong> ஆகியவை காணப்படுகின்றன. இவை உரிமையாளர் அல்லது தயாரிப்பாளரை குறிக்கும் <strong>குயவன் குறியீடுகள்</strong> (potter\'s marks) ஆகும்.</p>' },
        { type: 16, q: 'சங்க காலத்தில் நெசவுத் தொழில் எப்படி இருந்தது? ஆடைகள் தயாரிப்பதில் உள்ள பல்வேறு படிநிலைகளை விரிவாக விளக்கவும்.', a: '<p><strong>சங்க காலத்தில் நெசவுத் தொழில்:</strong></p><p>சங்க காலத்தில் நெசவுத் தொழில் மிகவும் வளர்ச்சியடைந்திருந்தது. தமிழகம் ஆடைத் தயாரிப்பில் உலகப் புகழ் பெற்றிருந்தது.</p><p><strong>ஆடை தயாரிப்பு படிநிலைகள்:</strong></p><ul><li><strong>1. பஞ்சு சேகரிப்பு</strong> – பருத்திக் காய்களிலிருந்து பஞ்சை பிரித்தெடுத்தல்</li><li><strong>2. நூற்றல் (Spinning)</strong> – பஞ்சை நூலாக நூற்பது. இதை <strong>பருத்திப்பெண்டீர்</strong> செய்தனர்</li><li><strong>3. சாயமிடுதல் (Dyeing)</strong> – இயற்கை வேர்கள், பூக்கள் மூலம் நிறமிடுதல்</li><li><strong>4. நெசவு (Weaving)</strong> – தறியில் நூலை நெய்து ஆடை தயாரித்தல்</li><li><strong>5. அலங்காரம்</strong> – ஆடையில் வண்ணமயமான வேலைப்பாடுகள் செய்தல்</li></ul><p><strong>சிறப்புகள்:</strong></p><ul><li>மதுரை மெல்லிய முசுவன் ஆடை மிகவும் மெல்லியது</li><li>ஆடைகளை வெளிநாடுகளுக்கு ஏற்றுமதி செய்தனர்</li><li>உரோமானிய வணிகர்கள் தமிழக ஆடைகளை வாங்கினர்</li></ul>' },
        { type: 16, q: 'பளபளப்பான மற்றும் மெருகூட்டப்படாத மட்பாண்டங்கள் என்றால் என்ன? மட்பாண்டங்கள் செய்யும் முறையை விவரிக்கவும்.', a: '<p><strong>1. பளபளப்பான மட்பாண்டங்கள்:</strong> மேற்பரப்பை மெருகேற்றி தயாரிக்கப்படும். கருப்பு மற்றும் சிவப்பு வண்ணங்களில் காணப்படும்.</p><p><strong>2. மெருகூட்டப்படாத மட்பாண்டங்கள்:</strong> இயற்கையான முரடான தோற்றமுடையவை. அன்றாட பயன்பாட்டிற்கு பயன்படும்.</p><p><strong>மட்பாண்டம் செய்யும் முறை:</strong></p><ul><li>மண் தேர்வு – களிமண்ணை தேர்ந்தெடுத்தல்</li><li>மண் பதனிடுதல் – மண்ணை நன்றாக பிசைந்து தயார் செய்தல்</li><li>வடிவமைத்தல் – குயவன் சக்கரத்தில் சுற்றி வடிவமைத்தல்</li><li>சூளை சுடுதல் (Kiln firing) – உயர் வெப்பத்தில் சுட்டு உறுதிப்படுத்துதல்</li><li>சாயமிடுதல் – தேவையான நிறங்களை இடுதல்</li></ul>' },
        { type: 16, q: 'கருப்பு மற்றும் சிவப்பு மட்பாண்டங்கள் பற்றி விரிவாக விளக்கவும்.', a: '<p><strong>கருப்பு மற்றும் சிவப்பு மட்பாண்டங்கள் (Black and Red Ware):</strong></p><p><strong>தனித்துவம்:</strong> பாண்டத்தின் வெளிப்புறம் <strong>கருப்பு நிறம்</strong>, உட்புறம் <strong>சிவப்பு நிறம்</strong>. கவிழ்த்து சுடும் முறையில் தயாரிக்கப்படும்.</p><p><strong>கண்டுபிடிக்கப்பட்ட இடங்கள்:</strong> கீழடி, அரிக்கமேடு, கொற்கை, மதுரை</p><p><strong>சிறப்புகள்:</strong></p><ul><li>மிகவும் மெல்லிய சுவர்கள்</li><li>உயர்தர தொழில்நுட்பம்</li><li>வெளிநாடுகளுக்கு ஏற்றுமதி செய்யப்பட்டன</li></ul>' },
      ]
    },
    {
      id: 'u2',
      label: 'அலகு II',
      title: 'வடிவமைப்பு மற்றும் கட்டுமான தொழில்நுட்பம்',
      icon: '🏛️',
      questions: [
        { type: 2, q: 'கட்டடக்கலை என்றால் என்ன?', a: '<p><strong>கட்டடக்கலை (Architecture)</strong> என்பது கட்டிடங்கள், நினைவுச்சின்னங்கள், கோயில்கள் ஆகியவற்றை வடிவமைக்கும் மற்றும் கட்டமைக்கும் கலை மற்றும் அறிவியல் ஆகும். இது அழகு, பயன்பாடு, உறுதி ஆகியவற்றை ஒருங்கிணைக்கும்.</p>' },
        { type: 2, q: 'இந்தியாவில் கட்டப்படும் கோவில்களின் வகைகள் யாவை?', a: '<ul><li><strong>நாகர பாணி</strong> – வட இந்திய பாணி (கரிகான் வடிவக் கோபுரம்)</li><li><strong>திராவிட பாணி</strong> – தென் இந்திய பாணி (பிரமிட் வடிவக் கோபுரம்)</li><li><strong>வேசர பாணி</strong> – நாகர + திராவிட கலப்பு பாணி</li></ul>' },
        { type: 2, q: 'தமிழகத்தின் மிக உயர்ந்த கோவில் கோபுரமாகக் கருதப்படுவது எது?', a: '<p>தமிழகத்தின் மிக உயர்ந்த கோவில் கோபுரமாக <strong>ஸ்ரீரங்கம் அரங்கநாதர் கோவில் கோபுரம் (ராஜகோபுரம்)</strong> கருதப்படுகிறது. இது <strong>72 மீட்டர்</strong> (236 அடி) உயரம் கொண்டது.</p>' },
        { type: 2, q: 'தொல்காப்பியர் குறிப்பிடும் நடுகல்லுக்குரிய ஆறு நிலைகள் யாவை?', a: '<ol><li><strong>மரபு</strong> – வீரனின் குலம் குறிப்பிடுதல்</li><li><strong>முன்னோர்</strong> – முன்னோர் பெயர் கூறுதல்</li><li><strong>செயல்</strong> – வீரச் செயல் விவரிக்குதல்</li><li><strong>காரணம்</strong> – இறப்பிற்கான காரணம்</li><li><strong>மரணம்</strong> – இறந்த விதம்</li><li><strong>விழா</strong> – நடுகல் நாட்டும் விழா</li></ol>' },
        { type: 2, q: 'மாமல்லபுரம் கடற்கரைக் கோயில் யாரால் கட்டப்பட்டது?', a: '<p>மாமல்லபுரம் கடற்கரைக் கோயில் <strong>நரசிம்மவர்மன் II (ராஜசிம்மன்)</strong> என்ற பல்லவ மன்னரால் கட்டப்பட்டது. கி.பி. 700-728 காலத்தில். இது <strong>யுனெஸ்கோ உலக பாரம்பரிய தளம்</strong> ஆகும்.</p>' },
        { type: 2, q: 'குடைவரைக் கோவில் என்றால் என்ன?', a: '<p><strong>குடைவரைக் கோவில்</strong> என்பது மலைகளை அல்லது பாறைகளை குடைந்து (வெட்டி) உருவாக்கப்பட்ட கோவில் ஆகும். இவை <strong>Rock-cut temples</strong> எனவும் அழைக்கப்படும்.</p>' },
        { type: 2, q: 'பஞ்சபாண்டவர்கள் இரதங்கள் யாவை?', a: '<ol><li><strong>தர்மராஜ இரதம்</strong> – மிகப் பெரியது</li><li><strong>பீம இரதம்</strong></li><li><strong>அர்ஜுன இரதம்</strong></li><li><strong>நகுல சகதேவ இரதம்</strong></li><li><strong>திரௌபதி இரதம்</strong> – மிகச் சிறியது</li></ol><p>இவை ஒரே கல்லில் செதுக்கப்பட்ட (monolithic) ஐந்து இரதங்கள் ஆகும்.</p>' },
        { type: 16, q: 'பல்லவர் கால கட்டிடக் கலைகள் பற்றி விவரிக்கவும்.', a: '<p><strong>பல்லவர் கால கட்டிடக்கலை:</strong></p><p>பல்லவர்கள் கி.பி. 4-9 நூற்றாண்டுகளில் ஆட்சி செய்தனர்.</p><p><strong>முக்கிய வகைகள்:</strong></p><ul><li><strong>குடைவரைக் கோவில்கள்</strong> – மலைகளை குடைந்து கட்டிய கோவில்கள்</li><li><strong>இரதங்கள் (Ratha)</strong> – ஒரே கல்லில் செதுக்கிய கோவில்கள். பஞ்ச பாண்டவ இரதங்கள்</li><li><strong>கட்டுமான கோவில்கள்</strong> – கல் கட்டிகளால் கட்டப்பட்ட கோவில்கள். கடற்கரை கோவில்</li></ul><p><strong>சிறப்புகள்:</strong></p><ul><li>யுனெஸ்கோ உலக பாரம்பரிய தளம்</li><li>அர்ஜுன தபசு – உலகின் மிகப் பெரிய பாறை சிற்பம்</li><li>திராவிட பாணி கட்டிடக்கலையின் தொடக்கம்</li></ul>' },
        { type: 16, q: 'சோழர் காலத்துப் பெருங்கோவில்களை பற்றி விவரிக்கவும்.', a: '<p><strong>சோழர் கால பெருங்கோவில்கள்:</strong></p><p><strong>1. பெரிய கோவில் (தஞ்சாவூர்):</strong></p><ul><li>ராஜராஜ சோழன் கட்டினார் (கி.பி. 1010)</li><li>66 மீட்டர் உயர விமானம்</li><li>யுனெஸ்கோ உலக பாரம்பரிய தளம்</li></ul><p><strong>2. கங்கை கொண்ட சோழபுரம்:</strong></p><ul><li>ராஜேந்திர சோழன் கட்டினார்</li><li>கங்கை நதி வெற்றி கொண்ட நினைவாக</li></ul><p><strong>3. ஐராவதேஸ்வரர் கோவில் (தாரசுரம்):</strong> ராஜராஜ சோழன் II கட்டினார்.</p>' },
        { type: 16, q: 'மாமல்லபுரத்தில் உள்ள கடற்கரைக் கோயில்கள் மற்றும் குகைக் கோயில்களை விவரிக்கவும்.', a: '<p><strong>கடற்கரை கோவில்கள்:</strong></p><ul><li>கி.பி. 700-728, ராஜசிம்மன் கட்டினார்</li><li>3 கோவில்கள் – 2 சிவன், 1 விஷ்ணு</li><li>யுனெஸ்கோ உலக பாரம்பரிய தளம்</li></ul><p><strong>குகைக் கோவில்கள்:</strong></p><ul><li>மஹிஷாசுரமர்தனி குகை – துர்கை கோவில்</li><li>வராஹ மண்டபம் – விஷ்ணு கோவில்</li><li>திரிமூர்த்தி குகை</li></ul><p><strong>பிற சிறப்புகள்:</strong> அர்ஜுன தபசு – உலகின் மிகப் பெரிய திறந்த வெளி பாறை சிற்பம்</p>' },
      ]
    },
    {
      id: 'u3',
      label: 'அலகு III',
      title: 'உற்பத்தித் தொழில்நுட்பம்',
      icon: '⚓',
      questions: [
        { type: 2, q: 'கட்டு மரங்களின் வேறு பெயர்கள் யாவை?', a: '<ul><li><strong>அம்பி</strong> – சிறிய படகு</li><li><strong>நாவாய்</strong> – பெரிய கப்பல்</li><li><strong>வங்கம்</strong> – வணிக கப்பல்</li><li><strong>ஓடம்</strong> – சாதாரண படகு</li><li><strong>பரிசல்</strong> – ஆற்றுப் படகு</li><li><strong>திமில்</strong> – மீன்பிடி படகு</li></ul>' },
        { type: 2, q: 'பரதவர் பற்றி குறிப்பு வரைக.', a: '<p><strong>பரதவர்</strong> என்பவர் சங்க காலத்தில் கடலோரங்களில் வாழ்ந்த <strong>மீனவ மக்கள்</strong> ஆவர். இவர்கள் மீன் பிடித்தல், கடல் வாணிகம், கப்பல் ஓட்டுதல் ஆகியவற்றில் வல்லவர்கள். இவர்கள் <strong>"நெய்தல்"</strong> திணையைச் சேர்ந்தவர்கள்.</p>' },
        { type: 2, q: 'நாணயங்கள் குறிப்பு வரைக.', a: '<p>சங்க காலத்தில் நாணயங்கள் <strong>வெள்ளி, தங்கம், செம்பு</strong> ஆகியவற்றால் செய்யப்பட்டன. <strong>கா, மஞ்சாடி, பொன்</strong> போன்ற நாணயங்கள் புழக்கத்தில் இருந்தன. உரோமானிய நாணயங்களும் தமிழகத்தில் கண்டெடுக்கப்பட்டுள்ளன.</p>' },
        { type: 2, q: 'நவரத்தினக் கற்களின் பெயர்களை எழுதுக.', a: '<ol><li>வைரம் (Diamond)</li><li>மாணிக்கம் (Ruby)</li><li>முத்து (Pearl)</li><li>பவளம் (Coral)</li><li>மரகதம் (Emerald)</li><li>நீலம் (Blue Sapphire)</li><li>புஷ்பராகம் (Topaz)</li><li>வைடூரியம் (Cat\'s eye)</li><li>கோமேதகம் (Hessonite)</li></ol>' },
        { type: 2, q: 'கம்மியர் என்பவர் யார்?', a: '<p><strong>கம்மியர்</strong> என்பவர் சங்க காலத்தில் <strong>இரும்பு மற்றும் பிற உலோகங்களை</strong> வேலை செய்த கொல்லர்கள் ஆவர். இவர்கள் வேல், வாள், கலப்பை போன்ற கருவிகளை தயாரித்தனர்.</p>' },
        { type: 2, q: 'மணிகளால் என்னென்ன பொருட்கள் செய்தனர்?', a: '<ul><li><strong>மாலைகள்</strong> – கழுத்தில் அணியும் அணிகலன்</li><li><strong>காப்பு (வளை)</strong> – கையில் அணியும் அணிகலன்</li><li><strong>காதணிகள்</strong> – காதில் அணியும் அணிகலன்</li><li><strong>கிரீடம்</strong> – தலையில் அணியும் முடி அலங்காரம்</li><li><strong>மோதிரம்</strong> – விரலில் அணியும் அணிகலன்</li></ul>' },
        { type: 16, q: 'பழந்தமிழர் கப்பல் கலை குறித்து விளக்கி எழுதுக.', a: '<p><strong>கப்பல் வகைகள்:</strong></p><ul><li><strong>வங்கம்</strong> – வணிக கப்பல், வெளிநாடுகளுக்கு</li><li><strong>நாவாய்</strong> – பெரிய கப்பல்</li><li><strong>அம்பி</strong> – சிறிய படகு</li><li><strong>திமில்</strong> – மீன்பிடி படகு</li></ul><p><strong>கப்பல் கட்டும் பொருட்கள்:</strong></p><ul><li>தேக்கு மரம், வேம்பு மரம்</li><li>மரப்பால் (Resin) – நீர் புகாமல் தடுக்க</li></ul><p><strong>திசை கண்டுபிடிக்கும் முறை:</strong></p><ul><li>நட்சத்திரங்களை பார்த்து திசை அறிந்தனர்</li><li>பறவைகளை வழிகாட்டியாக பயன்படுத்தினர்</li></ul><p><strong>வணிக இலக்குகள்:</strong> உரோமானிய சாம்ராஜ்யம், அரேபியா, தென்கிழக்கு ஆசிய நாடுகள்</p>' },
        { type: 16, q: 'பண்டைய தமிழர்களின் உலோகவியல் திறனை விளக்குங்கள்.', a: '<p><strong>இரும்பு உலோகவியல்:</strong></p><ul><li>கீழடி அகழ்வாராய்ச்சியில் இரும்பு கருவிகள் கிடைத்துள்ளன</li><li><strong>இருமுனை மின் இறக்கம்</strong> முறையில் இரும்பை உருக்கினர்</li><li>வேல், வாள், கலப்பை, அரிவாள் தயாரித்தனர்</li></ul><p><strong>வெண்கலம் (Bronze):</strong></p><ul><li>செம்பு + தகரம் கலந்து வெண்கலம் செய்தனர்</li><li>நடராஜர் சிற்பங்கள் வெண்கலத்தில் செய்யப்பட்டன</li></ul><p><strong>ஆதாரங்கள்:</strong> கீழடி, அரிக்கமேடு அகழ்வாராய்ச்சி கண்டுபிடிப்புகள்</p>' },
        { type: 16, q: 'நாணயங்கள் மற்றும் அவற்றின் வரலாற்று முக்கியத்துவம் பற்றி எழுதவும்.', a: '<p><strong>வகைகள்:</strong></p><ul><li>பொன் (Gold coins) – அரச நாணயங்கள்</li><li>வெள்ளி நாணயங்கள் – வணிக நாணயங்கள்</li><li>செப்பு நாணயங்கள் – அன்றாட பரிமாற்றம்</li></ul><p><strong>நாணயங்களில் காணப்படும் உருவங்கள்:</strong></p><ul><li>மீன், வில் – பாண்டியர், சேரர் சின்னங்கள்</li><li>புலி – சோழர் சின்னம்</li></ul><p><strong>வரலாற்று முக்கியத்துவம்:</strong></p><ul><li>அரசர்களை அடையாளம் காண உதவும்</li><li>வெளிநாட்டு வர்த்தகத்தை நிரூபிக்கும்</li><li>காலவரிசை நிர்ணயிக்க உதவும்</li></ul>' },
      ]

    {
      id: 'u4',
      label: 'அலகு IV',
      title: 'வேளாண்மை மற்றும் நீர் பாசன தொழில்நுட்பம்',
      icon: '🌾',
      questions: [
        { type: 2, q: 'கல்லணை குறித்துக் குறிப்பு வரைக.', a: '<p><strong>கல்லணை</strong> திருச்சிராப்பள்ளி மாவட்டத்தில் காவேரி நதியில் அமைந்துள்ளது. இதை <strong>கரிகால் சோழன்</strong> கி.மு. 2-ம் நூற்றாண்டில் கட்டினார். இது <strong>உலகின் மிகப் பழமையான நீர்த்தேக்கம்</strong> – இன்றும் பயன்பாட்டில் உள்ளது. நீளம் 329 மீட்டர்.</p>' },
        { type: 2, q: 'நீர் வெட்டியார் என்பவர் யார்?', a: '<p><strong>நீர் வெட்டியார்</strong> என்பவர் சங்க காலத்தில் <strong>வயல்களுக்கு நீர் பாசனம் நிர்வகித்த</strong> அலுவலர் ஆவர். இவர்கள் நீரை சரியான அளவில் பகிர்ந்தளிக்கும் பொறுப்பை வகித்தனர்.</p>' },
        { type: 2, q: 'குமிழித்தூம்பு குறிப்பு வரைக.', a: '<p><strong>குமிழித்தூம்பு</strong> என்பது நீர்த்தேக்கங்களில் நீரை வெளியேற்றுவதற்காக அமைக்கப்பட்ட <strong>அடிமட்ட வடிகால் குழாய் (sluice)</strong> ஆகும். தேவைப்படும்போது இதை திறந்து நீரை வயல்களுக்கு அனுப்பினர்.</p>' },
        { type: 2, q: 'மடை குறிப்பு வரைக.', a: '<p><strong>மடை (Sluice)</strong> என்பது ஏரி அல்லது கால்வாயில் நீரை கட்டுப்படுத்த அமைக்கப்படும் <strong>வாயில் (gate)</strong> ஆகும். இதை திறந்தால் நீர் வயல்களுக்கு சென்று விடும்.</p>' },
        { type: 2, q: 'முத்துக்குளித்தல் குறிப்பு வரைக.', a: '<p><strong>முத்துக்குளித்தல்</strong> என்பது கடலில் முங்கி <strong>முத்தெடுக்கும் தொழில்</strong> ஆகும். சங்க காலத்தில் <strong>கொற்கை</strong> முத்து வணிகத்திற்கு பிரசித்தமான இடம். இந்த முத்துகளை வெளிநாடுகளுக்கு ஏற்றுமதி செய்தனர்.</p>' },
        { type: 2, q: 'குளங்களின் நான்கு நன்மைகளை எழுதுக.', a: '<ul><li><strong>1. பாசன நீர்</strong> – விவசாயத்திற்கு தண்ணீர்</li><li><strong>2. குடிநீர்</strong> – மக்களுக்கும் கால்நடைகளுக்கும்</li><li><strong>3. மீன் வளர்ப்பு</strong> – மீன்பிடி தொழில்</li><li><strong>4. நிலத்தடி நீர் பெருக்கம்</strong> – கிணறுகளில் நீர் இருக்கும்</li></ul>' },

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let activeUnit = 'all';
let activeFilter = 'all';
let doneSet = new Set(JSON.parse(localStorage.getItem('tamilDone') || '[]'));
let currentUtterance = null;
let speakingId = null;

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function getCardId(uid, idx) { return uid + '-' + idx; }

function saveDone() {
  localStorage.setItem('tamilDone', JSON.stringify([...doneSet]));
}

function updateStats() {
  const total = document.querySelectorAll('.reader-card').length;
  const done = document.querySelectorAll('.reader-card.state-answered').length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('topStats').textContent = done + '/' + total + ' படித்தது';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
}

function renderAll() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const content = document.getElementById('mainContent');
  content.innerHTML = '';

  let totalCards = 0;

  for (const unit of data.units) {
    if (activeUnit !== 'all' && activeUnit !== unit.id) continue;

    const q2 = unit.questions.filter((q, i) => {
      if (activeFilter !== 'all' && q.type !== parseInt(activeFilter)) return false;
      if (search && !q.q.toLowerCase().includes(search)) return false;
      return true;
    });

    if (q2.length === 0) continue;

    // Unit title
    const uDiv = document.createElement('div');
    uDiv.className = 'unit-title';
    uDiv.innerHTML = `<div class="unit-icon">${unit.icon}</div><div><h2>${unit.label}</h2><h3>${unit.title}</h3></div>`;
    content.appendChild(uDiv);

    // Group by type
    const by2 = q2.filter(q => q.type === 2);
    const by16 = q2.filter(q => q.type === 16);

    function renderGroup(group, type) {
      if (group.length === 0) return;
      const sec = document.createElement('div');
      sec.className = 'section-label type-' + type;
      sec.innerHTML = `<span>${type} மதிப்பெண் விடைகள்</span>`;
      content.appendChild(sec);

      group.forEach((item, localIdx) => {
        const globalIdx = unit.questions.indexOf(item);
        const cid = getCardId(unit.id, globalIdx);
        const isDone = doneSet.has(cid);

        const card = document.createElement('div');
        card.className = `reader-card type-${type} ${isDone ? 'state-answered' : ''}`;
        card.id = 'card-' + cid;

        const qNum = localIdx + 1;

        card.innerHTML = `
          <div class="q-header" onclick="toggleAnswer('${cid}')">
            <div class="q-meta">
              <div class="q-num">${qNum}</div>
              <div class="mark-badge">${type}M</div>
              <div class="status-dot" id="dot-${cid}"></div>
            </div>
            <div class="q-text">${item.q}</div>
            <div class="q-actions" onclick="event.stopPropagation()">
              <button class="speak-btn" id="spk-${cid}" title="கேள்வி கேளு" onclick="speakQ('${cid}', \`${escQ(item.q)}\`)">🔊</button>
              <div class="wave-indicator" id="wave-${cid}">
                <div class="wave-bar"></div><div class="wave-bar"></div>
                <div class="wave-bar"></div><div class="wave-bar"></div>
              </div>
            </div>
          </div>
          <div class="answer-area" id="ans-${cid}">
            ${item.a}
            <div style="margin-top:14px; display:flex; flex-wrap:wrap; gap:8px;">
              <button class="read-answer-btn" id="rspk-${cid}" onclick="speakAns('${cid}', this)">🔊 விடையை கேளு</button>
              <button class="mark-done-btn ${isDone ? 'done' : ''}" id="done-${cid}" onclick="toggleDone('${cid}')">
                ${isDone ? '✅ படித்தது' : '⬜ படித்தது குறி'}
              </button>
            </div>
          </div>
          <button class="answer-toggle" onclick="toggleAnswer('${cid}')">
            <span>விடை காண்க</span>
            <span class="arrow">▼</span>
          </button>
        `;
        content.appendChild(card);
        totalCards++;
      });
    }

    if (activeFilter === 'all') {
      renderGroup(by2, 2);
      renderGroup(by16, 16);
    } else if (activeFilter === '2') {
      renderGroup(by2, 2);
    } else {
      renderGroup(by16, 16);
    }
  }

  if (totalCards === 0) {
    content.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>கேள்விகள் எதுவும் கிடைக்கவில்லை</p></div>';
  }

  updateStats();
}

function escQ(str) {
  return str.replace(/`/g, "'").replace(/\\/g, '\\\\').replace(/\n/g, ' ');
}

// ─────────────────────────────────────────────
// UNIT TABS
// ─────────────────────────────────────────────
function buildTabs() {
  const tabs = document.getElementById('unitTabs');
  tabs.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'tab-btn active';
  allBtn.textContent = '📚 அனைத்தும்';
  allBtn.onclick = () => { activeUnit = 'all'; setActiveTab(allBtn); renderAll(); };
  tabs.appendChild(allBtn);

  for (const unit of data.units) {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.textContent = unit.icon + ' ' + unit.label;
    btn.onclick = () => { activeUnit = unit.id; setActiveTab(btn); renderAll(); };
    tabs.appendChild(btn);
  }
}

function setActiveTab(el) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

// ─────────────────────────────────────────────
// FILTER
// ─────────────────────────────────────────────
function setFilter(val, btn) {
  activeFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

// ─────────────────────────────────────────────
// SEARCH
// ─────────────────────────────────────────────
function filterCards() { renderAll(); }

// ─────────────────────────────────────────────
// TOGGLE ANSWER
// ─────────────────────────────────────────────
function toggleAnswer(cid) {
  const ans = document.getElementById('ans-' + cid);
  if (!ans) return;
  ans.classList.toggle('show');
  const card = document.getElementById('card-' + cid);
  if (ans.classList.contains('show')) {
    card.classList.add('state-reading');
  } else {
    card.classList.remove('state-reading');
  }
}

// ─────────────────────────────────────────────
// EXPAND / COLLAPSE ALL
// ─────────────────────────────────────────────
function expandAll() {
  document.querySelectorAll('.answer-area').forEach(a => a.classList.add('show'));
  document.querySelectorAll('.reader-card').forEach(c => c.classList.add('state-reading'));
}
function collapseAll() {
  document.querySelectorAll('.answer-area').forEach(a => a.classList.remove('show'));
  document.querySelectorAll('.reader-card').forEach(c => { c.classList.remove('state-reading'); });
}

// ─────────────────────────────────────────────
// MARK DONE
// ─────────────────────────────────────────────
function toggleDone(cid) {
  const card = document.getElementById('card-' + cid);
  const btn = document.getElementById('done-' + cid);
  if (doneSet.has(cid)) {
    doneSet.delete(cid);
    card.classList.remove('state-answered');
    btn.classList.remove('done');
    btn.innerHTML = '⬜ படித்தது குறி';
  } else {
    doneSet.add(cid);
    card.classList.add('state-answered');
    btn.classList.add('done');
    btn.innerHTML = '✅ படித்தது';
  }
  saveDone();
  updateStats();
}

function resetDone() {
  if (!confirm('அனைத்து முன்னேற்றத்தையும் மீட்டமைக்கவா?')) return;
  doneSet.clear();
  saveDone();
  renderAll();
}

// ─────────────────────────────────────────────
// SPEECH (TTS)
// ─────────────────────────────────────────────
function stopSpeech() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (speakingId) {
    const spkBtn = document.getElementById('spk-' + speakingId);
    const wave = document.getElementById('wave-' + speakingId);
    const rspk = document.getElementById('rspk-' + speakingId);
    if (spkBtn) spkBtn.classList.remove('speaking');
    if (wave) wave.classList.remove('active');
    if (rspk) rspk.classList.remove('speaking');
    speakingId = null;
  }
}

function speak(text, cid, isAns) {
  stopSpeech();
  if (!window.speechSynthesis) { alert('உங்கள் உலாவியில் Text-to-Speech ஆதரிக்கப்படவில்லை.'); return; }

  const clean = text.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
  const utt = new SpeechSynthesisUtterance(clean);
  utt.lang = 'ta-IN';
  utt.rate = 0.85;
  utt.pitch = 1;

  speakingId = cid;
  const spkBtn = document.getElementById('spk-' + cid);
  const wave = document.getElementById('wave-' + cid);
  const rspk = document.getElementById('rspk-' + cid);

  if (!isAns && spkBtn) { spkBtn.classList.add('speaking'); if (wave) wave.classList.add('active'); }
  if (isAns && rspk) rspk.classList.add('speaking');

  utt.onend = () => { stopSpeech(); };
  utt.onerror = () => { stopSpeech(); };

  window.speechSynthesis.speak(utt);
}

function speakQ(cid, qText) {
  if (speakingId === cid) { stopSpeech(); return; }
  speak(qText, cid, false);
}

function speakAns(cid, btn) {
  if (speakingId === cid) { stopSpeech(); return; }
  const ans = document.getElementById('ans-' + cid);
  if (!ans) return;
  speak(ans.innerHTML, cid, true);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
buildTabs();
renderAll();
</script>
